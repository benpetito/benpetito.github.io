baseURL: https://benpetito.github.io/

title: "Ben Petito"

module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icons/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

languages:
  en:
    locale: en
    label: English
    title: "Ben Petito"
    weight: 1

defaultContentLanguage: en

markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

enableEmoji: true

params:
  background: /images/site/background.jpg

  logo:
    favicon: images/favicon-32x32.png

  gitRepo: https://github.com/benpetito/benpetito.github.io
  gitBranch: main

  topNavbar:
    maxVisibleSections: 5

  features:
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system

    portfolio:
      enable: true

    blog:
      enable: true
      showAuthor: true
      shareButtons:
        twitter: true
        linkedin: true
        reddit: true
        email: true

    comment:
      enable: false

    analytics:
      enable: false

    support:
      enable: false

    toc:
      enable: true

    tags:
      enable: true
      on_card: true

    flags:
      enable: false

    copyCodeButton:
      enable: true

    readingTime:
      enable: true

    pagination:
      maxPostsPerPage: 12

  footer:
    enable: true
    template: footer.html
    navigation:
      enable: true
      customMenus: false
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: false
