- name: Config Engine
  role: Tech Lead
  timeline: "2016 - 2019"
  url: ""
  summary: >
    A large-scale ICT transition platform built for SA Health to manage the move from the
    old to the new Royal Adelaide Hospital. The system tracked thousands of physical assets,
    managed staff transitions and software profiles, coordinated scheduling across departments,
    and generated floor plan visualisations. Built on Skyve with extensive custom modules.
  tags: ["enterprise", "government"]

