name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for .GitInfo / lastmod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"   # ⚠️ bump to match go.mod if you upgrade

      - name: Set up Node (for theme npm assets)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.2"   # matches local version; check https://github.com/gohugoio/hugo/releases for newer
          extended: true

      - name: Install npm dependencies (theme fonts/icons)
        run: npm install --prefix . $(hugo mod npm pack)
        # The Toha theme requires flag-icons, @fontsource/mulish, and katex.
        # `hugo mod npm pack` writes package.hugo.json; npm install reads it.

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
        env:
          HUGO_ENVIRONMENT: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
